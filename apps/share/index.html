<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shared Conversation — claude-view</title>
    <meta name="description" content="View a shared Claude conversation" />
    <script>
      // Sync dark mode class before first paint to prevent FOUC.
      // Share viewer is read-only — always follows system preference (no toggle).
      if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
        document.documentElement.classList.add('dark')
      }
      window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(e) {
        document.documentElement.classList.toggle('dark', e.matches)
      })
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
