# crates/db/Cargo.toml
[package]
name = "claude-view-db"
version.workspace = true
edition.workspace = true
license.workspace = true

[dependencies]
claude-view-core = { workspace = true }
claude-view-search = { workspace = true }
claude-view-session-parser = { workspace = true }
# Phase 4 — rollup table schema + typed I/O fns generated by
# `#[derive(RollupTable)]`. `crates/db/src/migrations/rollups.rs` points
# at `stats_core::migrations::STATEMENTS`; `stage_c/consumer.rs` calls
# the per-table `upsert_*` fns.
claude-view-stats-rollup = { path = "../stats-rollup" }
sqlx = { workspace = true }
rusqlite = { workspace = true }
tokio = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
dirs = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
chrono = { workspace = true }
memmap2 = { workspace = true }
memchr = { workspace = true }
walkdir = { workspace = true }
notify = { workspace = true }
flate2 = { workspace = true }
ts-rs = { workspace = true }
utoipa = { version = "5" }
claude-view-types = { workspace = true }
workspace-hack = { version = "0.1", path = "../../workspace-hack" }

[features]
codegen = ["claude-view-core/codegen", "claude-view-search/codegen"]

[dev-dependencies]
tempfile = { workspace = true }
tokio-test = { workspace = true }
serde_json = { workspace = true }
claude-view-server = { workspace = true }
axum = { workspace = true }
tower = { workspace = true }
