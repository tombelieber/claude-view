<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#030712">
<title>Claude View</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#030712;color:#e5e7eb;min-height:100dvh;display:flex;flex-direction:column}
#status{padding:24px;text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100dvh}
#status h1{font-size:20px;font-weight:600;margin-bottom:8px}
#status p{font-size:14px;color:#9ca3af}
.spinner{width:40px;height:40px;border:3px solid #374151;border-top-color:#22c55e;border-radius:50%;animation:spin 0.8s linear infinite;margin-bottom:16px}
@keyframes spin{to{transform:rotate(360deg)}}
.error{color:#f87171}
#monitor{display:none;flex:1;overflow-y:auto;padding:12px;padding-bottom:80px}
.session{background:#111827;border:1px solid #1f2937;border-radius:12px;padding:12px;margin-bottom:8px}
.session-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.session-project{font-size:14px;font-weight:600;color:#f3f4f6;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:70%}
.session-status{font-size:11px;padding:2px 8px;border-radius:9999px;font-weight:500}
.status-active{background:#052e16;color:#4ade80}
.status-idle{background:#1c1917;color:#a8a29e}
.status-completed{background:#172554;color:#60a5fa}
.session-detail{font-size:12px;color:#6b7280;margin-top:2px}
.session-cost{font-size:12px;color:#fbbf24;margin-top:4px}
#topbar{background:#111827;border-bottom:1px solid #1f2937;padding:12px 16px;display:none;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
#topbar h1{font-size:16px;font-weight:600}
#topbar .count{font-size:12px;color:#9ca3af}
</style>
</head>
<body>
<div id="status">
  <div class="spinner" id="spinner"></div>
  <h1 id="status-title">Pairing...</h1>
  <p id="status-msg">Generating keys and connecting</p>
</div>
<div id="topbar">
  <h1>Claude View</h1>
  <span class="count" id="session-count"></span>
</div>
<div id="monitor"></div>

<script src="https://cdn.jsdelivr.net/npm/tweetnacl@1.0.3/nacl-fast.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tweetnacl-util@0.15.1/nacl-util.min.js"></script>
<script>
(function() {
  'use strict';

  // --- IndexedDB helpers ---
  var DB_NAME = 'claude-view-mobile';
  var STORE = 'keys';

  function openDb() {
    return new Promise(function(resolve, reject) {
      var req = indexedDB.open(DB_NAME, 1);
      req.onupgradeneeded = function() { req.result.createObjectStore(STORE); };
      req.onsuccess = function() { resolve(req.result); };
      req.onerror = function() { reject(req.error); };
    });
  }

  function dbSet(key, val) {
    return openDb().then(function(db) {
      return new Promise(function(resolve, reject) {
        var tx = db.transaction(STORE, 'readwrite');
        tx.objectStore(STORE).put(val, key);
        tx.oncomplete = function() { resolve(); };
        tx.onerror = function() { reject(tx.error); };
      });
    });
  }

  function dbGet(key) {
    return openDb().then(function(db) {
      return new Promise(function(resolve) {
        var tx = db.transaction(STORE, 'readonly');
        var req = tx.objectStore(STORE).get(key);
        req.onsuccess = function() { resolve(req.result || null); };
        req.onerror = function() { resolve(null); };
      });
    });
  }

  // --- Base64 helpers from tweetnacl-util ---
  var b64Enc = nacl.util.encodeBase64;
  var b64Dec = nacl.util.decodeBase64;
  var utf8Dec = nacl.util.decodeUTF8;
  var utf8Enc = nacl.util.encodeUTF8;

  // --- DOM helpers ---
  var statusEl = document.getElementById('status');
  var statusTitle = document.getElementById('status-title');
  var statusMsg = document.getElementById('status-msg');
  var spinnerEl = document.getElementById('spinner');
  var monitorEl = document.getElementById('monitor');
  var topbarEl = document.getElementById('topbar');
  var sessionCountEl = document.getElementById('session-count');

  function showStatus(title, msg, isError) {
    statusEl.style.display = 'flex';
    monitorEl.style.display = 'none';
    topbarEl.style.display = 'none';
    statusTitle.textContent = title;
    statusMsg.textContent = msg;
    if (isError) {
      statusTitle.classList.add('error');
      spinnerEl.style.display = 'none';
    } else {
      statusTitle.classList.remove('error');
      spinnerEl.style.display = 'block';
    }
  }

  function showMonitor() {
    statusEl.style.display = 'none';
    monitorEl.style.display = 'block';
    topbarEl.style.display = 'flex';
  }

  // --- Sessions map ---
  var sessions = {};

  function renderSessions() {
    monitorEl.textContent = '';
    var ids = Object.keys(sessions).sort(function(a, b) {
      var sa = sessions[a], sb = sessions[b];
      var aActive = sa.status === 'active' ? 0 : 1;
      var bActive = sb.status === 'active' ? 0 : 1;
      return aActive - bActive || (sb.updated_at || 0) - (sa.updated_at || 0);
    });

    sessionCountEl.textContent = ids.length + ' session' + (ids.length !== 1 ? 's' : '');

    ids.forEach(function(id) {
      var s = sessions[id];
      var card = document.createElement('div');
      card.className = 'session';

      var header = document.createElement('div');
      header.className = 'session-header';

      var proj = document.createElement('span');
      proj.className = 'session-project';
      proj.textContent = s.project || s.session_id || id;

      var badge = document.createElement('span');
      badge.className = 'session-status';
      var st = (s.status || 'unknown').toLowerCase();
      if (st === 'active') badge.className += ' status-active';
      else if (st === 'idle') badge.className += ' status-idle';
      else badge.className += ' status-completed';
      badge.textContent = st;

      header.appendChild(proj);
      header.appendChild(badge);
      card.appendChild(header);

      if (s.model) {
        var model = document.createElement('div');
        model.className = 'session-detail';
        model.textContent = s.model;
        card.appendChild(model);
      }

      if (s.total_cost_usd > 0) {
        var cost = document.createElement('div');
        cost.className = 'session-cost';
        cost.textContent = '$' + s.total_cost_usd.toFixed(4);
        card.appendChild(cost);
      }

      if (s.updated_at > 0) {
        var time = document.createElement('div');
        time.className = 'session-detail';
        var d = new Date(s.updated_at * 1000);
        time.textContent = d.toLocaleTimeString();
        card.appendChild(time);
      }

      monitorEl.appendChild(card);
    });

    if (ids.length === 0) {
      var empty = document.createElement('div');
      empty.style.cssText = 'text-align:center;padding:48px 0;color:#6b7280';
      empty.textContent = 'No active sessions';
      monitorEl.appendChild(empty);
    }
  }

  // --- Main flow ---
  async function main() {
    var params = new URLSearchParams(window.location.search);
    var macPubKeyB64 = params.get('k');
    var token = params.get('t');

    // Check if already paired
    var existingDeviceId = await dbGet('device_id');
    var existingEncSecret = await dbGet('enc_secret');
    var existingRelayUrl = await dbGet('relay_url');

    if (existingDeviceId && existingEncSecret && existingRelayUrl) {
      // Already paired, go straight to monitor
      showStatus('Connecting...', 'Resuming session');
      connectToRelay(existingRelayUrl, existingDeviceId);
      return;
    }

    if (!macPubKeyB64 || !token) {
      showStatus('Not Paired', 'Scan a QR code from your desktop Claude View to pair.', true);
      return;
    }

    showStatus('Pairing...', 'Generating keys');

    try {
      // Derive relay base URLs from current page origin
      var origin = window.location.origin;
      var relayWs = origin.replace('https://', 'wss://').replace('http://', 'ws://') + '/ws';

      // Generate phone keypairs
      var encKp = nacl.box.keyPair();
      var signKp = nacl.sign.keyPair();

      // Store keys
      var deviceId = 'phone-' + crypto.randomUUID().substring(0, 8);
      await dbSet('device_id', deviceId);
      await dbSet('enc_secret', b64Enc(encKp.secretKey));
      await dbSet('enc_public', b64Enc(encKp.publicKey));
      await dbSet('sign_secret', b64Enc(signKp.secretKey));
      await dbSet('sign_public', b64Enc(signKp.publicKey));
      await dbSet('relay_url', relayWs);
      await dbSet('mac_enc_public', macPubKeyB64);

      showStatus('Pairing...', 'Claiming pairing token');

      // Encrypt phone's X25519 pubkey with Mac's X25519 pubkey
      var macPubKey = b64Dec(macPubKeyB64);
      var nonce = nacl.randomBytes(24);
      var encrypted = nacl.box(encKp.publicKey, nonce, macPubKey, encKp.secretKey);
      var wire = new Uint8Array(nonce.length + encrypted.length);
      wire.set(nonce);
      wire.set(encrypted, nonce.length);
      var pubkeyEncryptedBlob = b64Enc(wire);

      // POST /pair/claim
      var claimUrl = origin + '/pair/claim';
      var resp = await fetch(claimUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          one_time_token: token,
          device_id: deviceId,
          pubkey: b64Enc(signKp.publicKey),
          pubkey_encrypted_blob: pubkeyEncryptedBlob
        })
      });

      if (!resp.ok) {
        var errText = await resp.text().catch(function() { return ''; });
        throw new Error('Claim failed (' + resp.status + '): ' + errText);
      }

      showStatus('Paired!', 'Connecting to relay');
      connectToRelay(relayWs, deviceId);
    } catch (err) {
      showStatus('Pairing Failed', err.message || 'Unknown error', true);
    }
  }

  function connectToRelay(relayWs, deviceId) {
    var ws;
    var reconnectDelay = 1000;
    var heartbeatTimer;

    function connect() {
      showStatus('Connecting...', 'Opening WebSocket');
      ws = new WebSocket(relayWs);

      ws.onopen = async function() {
        reconnectDelay = 1000;

        // Authenticate with Ed25519 signature
        var signSecretB64 = await dbGet('sign_secret');
        if (!signSecretB64) {
          showStatus('Error', 'Missing signing key. Re-pair required.', true);
          return;
        }

        var signSecret = b64Dec(signSecretB64);
        var timestamp = Math.floor(Date.now() / 1000);
        var payload = timestamp + ':' + deviceId;
        var signature = nacl.sign.detached(utf8Dec(payload), signSecret);

        ws.send(JSON.stringify({
          type: 'auth',
          device_id: deviceId,
          timestamp: timestamp,
          signature: b64Enc(signature)
        }));

        // Heartbeat
        heartbeatTimer = setInterval(function() {
          if (ws.readyState === WebSocket.OPEN) {
            ws.send('ping');
          }
        }, 30000);
      };

      ws.onmessage = async function(evt) {
        var text = typeof evt.data === 'string' ? evt.data : '';
        if (!text || text === 'pong') return;

        var msg;
        try { msg = JSON.parse(text); } catch(e) { return; }

        // Auth response
        if (msg.type === 'auth_ok') {
          showMonitor();
          renderSessions();
          return;
        }

        if (msg.type === 'error') {
          showStatus('Error', msg.message || 'Relay error', true);
          return;
        }

        // Encrypted payload from Mac
        if (msg.payload) {
          var macPubB64 = await dbGet('mac_enc_public');
          var encSecretB64 = await dbGet('enc_secret');
          if (!macPubB64 || !encSecretB64) return;

          try {
            var macPub = b64Dec(macPubB64);
            var encSecret = b64Dec(encSecretB64);
            var wireData = b64Dec(msg.payload);
            var n = wireData.slice(0, 24);
            var ct = wireData.slice(24);
            var plain = nacl.box.open(ct, n, macPub, encSecret);
            if (!plain) return;

            var session = JSON.parse(utf8Enc(plain));
            if (session.session_id) {
              sessions[session.session_id] = session;
              renderSessions();
            } else if (session.type === 'session_completed' && session.session_id) {
              if (sessions[session.session_id]) {
                sessions[session.session_id].status = 'completed';
                renderSessions();
              }
            }
          } catch(e) {
            // Decryption or parse error, skip
          }
        }
      };

      ws.onclose = function() {
        clearInterval(heartbeatTimer);
        setTimeout(function() {
          reconnectDelay = Math.min(reconnectDelay * 2, 30000);
          connect();
        }, reconnectDelay);
      };

      ws.onerror = function() {
        // onclose will fire after this
      };
    }

    connect();
  }

  main();
})();
</script>
</body>
</html>
