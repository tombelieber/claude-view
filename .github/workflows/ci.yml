name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  no-implicit-clamp:
    name: Contract Gate (No Implicit 30d Clamp)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Ensure clamp gate script is executable
        run: test -x scripts/ci/check-no-implicit-30d.sh

      - name: Block implicit clamp and redirect regressions
        run: bash scripts/ci/check-no-implicit-30d.sh

  analytics-scope-contract:
    name: Contract Gate (Analytics Scope)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - uses: dtolnay/rust-toolchain@4be9e76fd7c4901c61fb841f559994984270fce7  # stable

      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5  # v2.8.2

      - name: Ensure analytics scope gate script is executable
        run: test -x scripts/ci/check-analytics-scope-contract.sh

      - name: Analytics scope contract gate
        run: bash scripts/ci/check-analytics-scope-contract.sh

  integrity-gates:
    name: integrity-gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - uses: dtolnay/rust-toolchain@4be9e76fd7c4901c61fb841f559994984270fce7  # stable

      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5  # v2.8.2

      - name: Run integrity gates
        run: bash scripts/integrity/ci-gates.sh

      - name: Upload integrity artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: integrity-artifacts
          path: artifacts/integrity/**
          if-no-files-found: error

  js:
    name: JS (lint + typecheck + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          fetch-depth: 0  # needed for turbo --affected

      - uses: oven-sh/setup-bun@3d267786b128fe76c2f16a390aa2448b815359f3  # v2.1.2

      - name: Verify package manifests
        run: bun run verify:manifests

      - run: bun install --frozen-lockfile

      - name: Lint + typecheck + test (affected only)
        run: bun run ci:check

  rust:
    name: Rust (clippy + test + deny)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - uses: dtolnay/rust-toolchain@4be9e76fd7c4901c61fb841f559994984270fce7  # stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5  # v2.8.2

      - name: cargo fmt
        run: cargo fmt --all --check

      - name: cargo clippy
        run: cargo clippy --workspace -- -D warnings

      - name: cargo test
        run: cargo test --workspace -- --skip export_bindings_

      - uses: taiki-e/install-action@d9c7e4de96b8ff27364cd0b5890e9280b99adbb3  # v2.68.11
        with:
          tool: cargo-deny

      - name: cargo deny
        run: cargo deny check

  openapi-drift:
    name: OpenAPI Drift Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - uses: dtolnay/rust-toolchain@4be9e76fd7c4901c61fb841f559994984270fce7  # stable

      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5  # v2.8.2

      - uses: oven-sh/setup-bun@3d267786b128fe76c2f16a390aa2448b815359f3  # v2.1.2

      - run: bun install --frozen-lockfile

      - name: Export OpenAPI spec from Rust
        run: cargo test -p claude-view-server --lib -- export_openapi --nocapture

      - name: Run codegen + skill gen
        run: cd packages/plugin && bun run codegen && bun run gen:skills

      - name: Check for uncommitted drift
        run: |
          git diff --exit-code packages/plugin/scripts/openapi.json \
            packages/plugin/src/tools/generated/ \
            packages/plugin/skills/*/SKILL.md || {
            echo "ERROR: Generated files are out of date. To fix:"
            echo "  1. cargo test -p claude-view-server --lib -- export_openapi --nocapture"
            echo "  2. cd packages/plugin && bun run build"
            exit 1
          }

  web-e2e:
    name: Web E2E (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - uses: oven-sh/setup-bun@3d267786b128fe76c2f16a390aa2448b815359f3  # v2.1.2

      - uses: dtolnay/rust-toolchain@4be9e76fd7c4901c61fb841f559994984270fce7  # stable

      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5  # v2.8.2

      - name: Install workspace dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browser (Chromium) and OS deps
        run: |
          cd apps/web
          if [ "${RUNNER_OS}" = "Linux" ]; then
            bunx playwright install --with-deps chromium
          else
            bunx playwright install chromium
          fi

      - name: Build web assets for STATIC_DIR
        run: cd apps/web && bun run build

      - name: Run web e2e contract checks
        run: cd apps/web && bun run test:e2e e2e/dashboard-time-range.spec.ts e2e/insights-range-contract.spec.ts

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: playwright-report-macos
          path: |
            apps/web/playwright-report
            apps/web/test-results
          if-no-files-found: ignore
